<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Site Builder</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.top {
    padding: 10px;
    background: #111827;
}

textarea {
    width: 100%;
    height: 200px;
    background: #0b1220;
    color: #22c55e;
    border: none;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.pages {
    padding: 10px;
}

.page-link {
    display: block;
    margin: 5px 0;
    color: #60a5fa;
    cursor: pointer;
}

iframe {
    width: 100%;
    height: 400px;
    border: none;
    background: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="top">
    <h2>🧠 Mini Créateur de pages RAW</h2>

    <textarea id="code" placeholder="Écris ton HTML ici..."></textarea>

    <button onclick="createPage()">➕ Créer une nouvelle page</button>
</div>

<div class="pages">
    <h3>📄 Pages créées :</h3>
    <div id="list"></div>
</div>

<script>
let pages = [];

function createPage() {
    let code = document.getElementById("code").value;

    if (!code.trim()) return;

    let id = pages.length + 1;

    pages.push({ id, code });

    let div = document.createElement("div");
    div.className = "page-link";
    div.innerText = "Page " + id;

    div.onclick = function () {
        openPage(code);
    };

    document.getElementById("list").appendChild(div);
}

function openPage(code) {
    let win = window.open();
    win.document.write(code);
    win.document.close();
}
</script>

</body>
</html>
