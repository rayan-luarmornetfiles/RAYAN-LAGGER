<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>IA Excuses Sans API 🤖</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #4a6cf7;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3b56d1;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #f0f0ff;
      min-height: 50px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>IA Excuses 🤖</h2>

  <textarea id="input" placeholder="Ex: je n’ai pas fait le ménage / mes devoirs / je suis en retard"></textarea>

  <button onclick="generate()">Générer une excuse</button>

  <div class="result" id="result"></div>
</div>

<script>
function generate() {
  const text = document.getElementById("input").value.toLowerCase();

  const fatigue = [
    "J’étais vraiment épuisé après une journée très chargée, j’ai dû me reposer un moment.",
    "Je ne me sentais pas très bien et j’avais besoin de récupérer.",
    "J’ai eu une grosse baisse d’énergie et j’ai dû faire une pause."
  ];

  const travail = [
    "J’ai eu énormément de travail scolaire à gérer en même temps.",
    "Je me suis retrouvé submergé par mes cours et mes devoirs.",
    "J’ai mal organisé mon temps à cause d’une charge de travail trop importante."
  ];

  const imprévu = [
    "J’ai eu un imprévu personnel qui m’a complètement décalé ma journée.",
    "Un événement inattendu m’a empêché de le faire à temps.",
    "Une situation urgente est arrivée et j’ai dû m’en occuper en priorité."
  ];

  function random(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  let result = "";

  if (text.includes("ménage")) {
    result = random(fatigue);
  }
  else if (text.includes("devoir") || text.includes("école") || text.includes("cours")) {
    result = random(travail);
  }
  else if (text.includes("retard")) {
    result = "J’ai rencontré un imprévu sur le trajet qui m’a retardé.";
  }
  else {
    result = random(imprévu);
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
