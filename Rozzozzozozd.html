<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Requêtes Régulées</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 200px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #logConsole {
            margin-top: 20px;
            background: #2c3e50;
            color: #2ecc71;
            padding: 15px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Régulateur de Flux (Rate Limiter)</h2>
    
    <div class="form-group">
        <label for="targetUrl">URL Cible (Test Sécurisé) :</label>
        <input type="text" id="targetUrl" value="https://jsonplaceholder.typicode.com/posts/1" disabled>
    </div>

    <div class="form-group">
        <label for="reqPerSec">Requêtes maximum par seconde :</label>
        <select id="reqPerSec">
            <option value="1">1 requête / sec</option>
            <option value="2">2 requêtes / sec</option>
            <option value="5">5 requêtes / sec</option>
        </select>
    </div>

    <div class="form-group">
        <label for="totalReq">Nombre total de demandes à envoyer :</label>
        <input type="number" id="totalReq" value="5" min="1" max="20">
    </div>

    <button id="startBtn" onclick="lancerFlux()">Démarrer le traitement</button>

    <div id="logConsole">En attente d'instructions...</div>
</div>

<script>
function ajouterLog(texte) {
    const consoleDiv = document.getElementById('logConsole');
    const heure = new Date().toLocaleTimeString();
    consoleDiv.innerHTML += `[${heure}] ${texte}<br>`;
    consoleDiv.scrollTop = consoleDiv.scrollHeight; // Défilement automatique vers le bas
}

function lancerFlux() {
    const bouton = document.getElementById('startBtn');
    const reqPerSec = parseInt(document.getElementById('reqPerSec').value);
    const totalReq = parseInt(document.getElementById('totalReq').value);
    const url = document.getElementById('targetUrl').value;
    
    // Calcul de l'intervalle obligatoire entre chaque requête (en millisecondes)
    const intervalle = 1000 / reqPerSec; 
    let requetesEnvoyees = 0;

    // Verrouillage de l'interface pour éviter les doubles clics accidentels
    bouton.disabled = true;
    document.getElementById('logConsole').innerHTML = ""; // Réinitialise la console
    ajouterLog(`Début du traitement : ${totalReq} requêtes prévues à un rythme de ${reqPerSec}/s.`);

    // Fonction interne récursive pour gérer la file d'attente du flux
    function executerSuivant() {
        if (requetesEnvoyees < totalReq) {
            requetesEnvoyees++;
            const numeroActuel = requetesEnvoyees;
            
            ajouterLog(`Envoi de la demande #${numeroActuel}...`);
            
            // Envoi de la requête asynchrone via fetch
            fetch(url)
                .then(reponse => {
                    if(reponse.ok) {
                        ajouterLog(`Succès #${numeroActuel} : Code ${reponse.status}`);
                    }
                })
                .catch(erreur => {
                    ajouterLog(`Échec #${numeroActuel} : Impossible de joindre le serveur`);
                });

            // On planifie la prochaine requête en respectant scrupuleusement le délai calculé
            setTimeout(executerSuivant, intervalle);
        } else {
            // Une fois la file d'attente vide, on réactive le bouton
            setTimeout(() => {
                ajouterLog("Fin du traitement. Interface réactivée.");
                bouton.disabled = false;
            }, intervalle);
        }
    }

    // Lancement de la première tâche de la file
    executerSuivant();
}
</script>

</body>
</html>
