<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Builder de Site</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #0f172a;
    color: white;
}

.left {
    width: 50%;
    padding: 10px;
    box-sizing: border-box;
    border-right: 2px solid #1e293b;
}

textarea {
    width: 100%;
    height: 90%;
    background: #111827;
    color: #22c55e;
    border: none;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.right {
    width: 50%;
    background: white;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<div class="left">
    <h2>🧠 Éditeur HTML</h2>

    <textarea id="code">
<!DOCTYPE html>
<html>
<head>
<title>Mon site</title>
</head>
<body style="font-family: Arial; text-align:center;">
<h1>🚀 Mon site</h1>
<p>Change ce code et clique sur lancer</p>
</body>
</html>
    </textarea>

    <button onclick="run()">▶ Lancer le site</button>
</div>

<div class="right">
    <iframe id="preview"></iframe>
</div>

<script>
function run() {
    let code = document.getElementById("code").value;
    let iframe = document.getElementById("preview");

    iframe.srcdoc = code;
}
</script>

</body>
</html>
