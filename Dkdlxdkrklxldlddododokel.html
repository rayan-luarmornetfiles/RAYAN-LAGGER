<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Virtuelle</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    text-align: center;
    padding-top: 50px;
}

.card {
    margin: 30px auto;
    width: 380px;
    height: 220px;
    border-radius: 18px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    position: relative;
    text-align: left;
    overflow: hidden;
}

.glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    top: -60px;
    right: -60px;
}

.title {
    font-size: 14px;
    opacity: 0.9;
}

.id {
    margin-top: 40px;
    font-size: 22px;
    letter-spacing: 3px;
}

.user {
    margin-top: 20px;
    font-size: 16px;
    text-transform: uppercase;
}

.money {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 22px;
    font-weight: bold;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<h1>💳 Carte de compte </h1>

<button onclick="generate()">Générer carte</button>

<div class="card">
    <div class="glow"></div>

    <div class="title">CYBER ACCOUNT / GLOBAL WALLET</div>

    <div id="id" class="id">ID: ---- ---- ----</div>
    <div id="user" class="user">UTILISATEUR</div>

    <div id="money" class="money">0 CRÉDITS</div>
</div>

<script>
function randomBlock() {
    return Math.floor(1000 + Math.random() * 9000);
}

function randomMoney() {
    return Math.floor(Math.random() * 9999999);
}

function names() {
    const list = ["Player One", "Neo Trader", "Cyber User", "Alpha Node", "Ghost Account"];
    return list[Math.floor(Math.random() * list.length)];
}

function generate() {
    document.getElementById("id").innerText =
        "ID: " + randomBlock() + "-" + randomBlock() + "-" + randomBlock();

    document.getElementById("user").innerText = names();

    document.getElementById("money").innerText =
        randomMoney().toLocaleString() + " CRÉDITS";
}
</script>

</body>
</html>
