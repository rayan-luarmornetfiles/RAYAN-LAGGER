<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur de carte fictive</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding-top: 50px;
}

.card {
    margin: 30px auto;
    width: 320px;
    height: 180px;
    border-radius: 15px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.code {
    font-size: 18px;
    margin: 10px 0;
    letter-spacing: 2px;
}

.money {
    font-size: 22px;
    margin-top: 20px;
    font-weight: bold;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #22c55e;
    color: white;
}
button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<h1>🎴 Générateur de carte fictive</h1>

<button onclick="generateCard()">Générer carte</button>

<div class="card">
    <div id="code1" class="code">XXXX XXXX XXXX XXXX</div>
    <div id="code2" class="code">CODE: XXXX-XXXX</div>
    <div id="money" class="money">💰 Argent: 0€</div>
</div>

<script>
function randomBlock() {
    return Math.floor(1000 + Math.random() * 9000);
}

function generateCard() {
    let cardNumber = `${randomBlock()} ${randomBlock()} ${randomBlock()} ${randomBlock()}`;
    let secretCode = `CODE: ${randomBlock()}-${randomBlock()}`;
    let money = Math.floor(Math.random() * 100000) + "€";

    document.getElementById("code1").innerText = cardNumber;
    document.getElementById("code2").innerText = secretCode;
    document.getElementById("money").innerText = "💰 Argent: " + money;
}
</script>

</body>
</html>
