<!DOCTYPE html> <html lang="fr"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>TG Julien</title>     <style>         body {             font-family: Arial, sans-serif;             display: flex;             flex-direction: column;             align-items: center;             justify-content: center;             min-height: 100vh;             margin: 0;             background-color: #f0f0f0;         }         button {             padding: 15px 30px;             font-size: 24px;             cursor: pointer;             background-color: #ff4d4d;             color: white;             border: none;             border-radius: 8px;             box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);             transition: background-color 0.3s ease;         }         button:hover {             background-color: #e60000;         }         #messageContainer {             margin-top: 20px;             text-align: center;             font-size: 30px;             color: #333;             word-wrap: break-word; /* Pour que les mots longs ne débordent pas */             max-width: 90%; /* Pour éviter que ça ne prenne toute la largeur sur de grands écrans */         }     </style> </head> <body>      <button id="tgJulienButton">TG Julien</button>     <div id="messageContainer"></div>      <script>         document.getElementById('tgJulienButton').addEventListener('click', function() {             const messageContainer = document.getElementById('messageContainer');             const newMessage = document.createElement('span');             newMessage.textContent = 'TG Julien ';             messageContainer.appendChild(newMessage);             // Tu peux ajouter une petite animation ou un style pour chaque nouveau message si tu veux !         });     </script>  </body> </html>
