<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini site router</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

nav {
    background: #111827;
    padding: 10px;
}

nav button {
    margin-right: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #22c55e;
    color: white;
}

.container {
    padding: 20px;
}
</style>
</head>

<body>

<nav>
    <button onclick="go('/')">Accueil</button>
    <button onclick="go('/mapage')">Ma page</button>
    <button onclick="go('/test')">Test</button>
</nav>

<div class="container" id="app"></div>

<script>
function render(path) {
    const app = document.getElementById("app");

    if (path === "/") {
        app.innerHTML = "<h1>🏠 Accueil</h1><p>Bienvenue sur le site</p>";
    }
    else if (path === "/mapage") {
        app.innerHTML = "<h1>📄 Ma page</h1><p>Tu es sur /mapage</p>";
    }
    else if (path === "/test") {
        app.innerHTML = "<h1>🧪 Test</h1><p>Page de test</p>";
    }
    else {
        app.innerHTML = "<h1>404 ❌</h1><p>Page introuvable</p>";
    }
}

function go(path) {
    history.pushState({}, "", path);
    render(path);
}

// quand tu changes de page avec navigateur
window.onpopstate = () => {
    render(window.location.pathname);
};

// premier chargement
render(window.location.pathname);
</script>

</body>
</html>
