<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAL AI EXCUSE 💜</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#090011;
font-family:Arial;
color:white;
}

.card{
width:700px;
padding:30px;
border-radius:25px;
background:#140020;
box-shadow:0 0 30px #a200ff,0 0 80px #6a00ff;
}

h1{
text-align:center;
color:#ff00ff;
}

textarea{
width:100%;
height:120px;
padding:15px;
border:none;
border-radius:15px;
background:#220033;
color:white;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#6a00ff,#ff00ff);
color:white;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
background:#1a0025;
min-height:120px;
line-height:1.6;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="card">

<h1>💜 REAL AI EXCUSE 💜</h1>

<textarea id="input"
placeholder="Exemple : j'ai oublié l'anniversaire de ma copine"></textarea>

<button onclick="generateExcuse()">
⚡ Générer avec IA
</button>

<div class="result" id="result">
Résultat IA...
</div>

</div>

<script>

const API_KEY = "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";

async function generateExcuse(){

const input =
document.getElementById("input").value;

if(!input.trim()){
document.getElementById("result").innerHTML =
"Écris une situation 😄";
return;
}

document.getElementById("result").innerHTML =
"Génération IA en cours...";

try{

const response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + API_KEY
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[

{
role:"system",
content:
"Tu es une IA qui génère des excuses humaines, crédibles, naturelles, variées et réalistes."
},

{
role:"user",
content:
"Situation : " + input +
". Génère une excuse crédible et naturelle."
}

],

temperature:1.2

})

});

const data = await response.json();

document.getElementById("result").innerHTML =
data.choices[0].message.content;

}
catch(err){

document.getElementById("result").innerHTML =
"Erreur API 😭";

console.log(err);

}

}

</script>

</body>
</html>
