<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YourTube</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f0f0f;
  --surface:#181818;
  --surface2:#272727;
  --text:#fff;
  --muted:#aaa;
  --border:#333;
  --accent:#3ea6ff;
  --sidebar:230px;
  --header:60px;
}

body{
  font-family:'Roboto',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--header);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:700;
}

.logo-icon{
  width:34px;
  height:24px;
  background:red;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-icon span{
  font-size:14px;
}

.search-bar{
  flex:1;
  max-width:650px;
  display:flex;
  margin:0 30px;
}

.search-bar input{
  flex:1;
  height:42px;
  background:#121212;
  border:1px solid var(--border);
  border-right:none;
  border-radius:25px 0 0 25px;
  color:white;
  padding:0 15px;
  outline:none;
  font-size:15px;
}

.search-bar input:focus{
  border-color:var(--accent);
}

.search-bar button{
  width:70px;
  border:none;
  background:var(--surface2);
  border-radius:0 25px 25px 0;
  color:white;
  cursor:pointer;
  font-size:18px;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:10px;
}

.icon-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:none;
  color:white;
  cursor:pointer;
  font-size:18px;
}

.icon-btn:hover{
  background:var(--surface2);
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff6b6b,#feca57);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* LAYOUT */

.layout{
  display:flex;
  margin-top:var(--header);
}

/* SIDEBAR */

aside{
  width:var(--sidebar);
  position:fixed;
  top:var(--header);
  bottom:0;
  left:0;
  overflow-y:auto;
  background:var(--bg);
  border-right:1px solid var(--border);
  padding-top:10px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:20px;
  padding:12px 20px;
  cursor:pointer;
  transition:.2s;
}

.nav-item:hover{
  background:var(--surface2);
}

.nav-item.active{
  background:var(--surface2);
  font-weight:700;
}

.divider{
  height:1px;
  background:var(--border);
  margin:12px 0;
}

/* MAIN */

main{
  margin-left:var(--sidebar);
  width:100%;
  padding:20px;
}

/* CHIPS */

.chips{
  display:flex;
  gap:10px;
  margin-bottom:25px;
  overflow-x:auto;
}

.chip{
  border:none;
  padding:8px 14px;
  border-radius:10px;
  background:var(--surface2);
  color:white;
  cursor:pointer;
  white-space:nowrap;
}

.chip.active{
  background:white;
  color:black;
}

/* VIDEOS */

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.video-card{
  cursor:pointer;
}

.thumb{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

.thumb img{
  width:100%;
  display:block;
  transition:.3s;
}

.video-card:hover img{
  transform:scale(1.04);
}

.play{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.2s;
}

.video-card:hover .play{
  opacity:1;
}

.play-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.duration{
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  padding:3px 7px;
  border-radius:4px;
  font-size:12px;
}

.video-info{
  display:flex;
  gap:12px;
  margin-top:12px;
}

.channel-icon{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  background:#ff5722;
}

.video-meta{
  flex:1;
}

.video-title{
  font-size:15px;
  font-weight:500;
  line-height:1.4;
  margin-bottom:5px;
}

.video-channel,
.video-stats{
  font-size:13px;
  color:var(--muted);
}

/* MODAL */

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  width:100%;
  max-width:950px;
  background:var(--surface);
  border-radius:16px;
  overflow:hidden;
}

.player{
  position:relative;
  padding-top:56.25%;
  background:black;
}

.player iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.7);
  color:white;
  cursor:pointer;
  font-size:18px;
  z-index:10;
}

.close-btn:hover{
  background:red;
}

.modal-info{
  padding:20px;
}

.modal-title{
  font-size:22px;
  margin-bottom:10px;
}

.modal-meta{
  color:var(--muted);
}

/* MOBILE */

@media(max-width:900px){

  aside{
    display:none;
  }

  main{
    margin-left:0;
  }

  .search-bar{
    margin:0 10px;
  }

}
</style>
</head>

<body>

<header>

<div class="logo">
  <div class="logo-icon">
    <span>▶</span>
  </div>
  <span>YourTube</span>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Rechercher une vidéo...">
  <button onclick="doSearch()">🔍</button>
</div>

<div class="header-icons">
  <button class="icon-btn">🔔</button>
  <button class="icon-btn">📤</button>
  <div class="avatar">U</div>
</div>

</header>

<div class="layout">

<aside>

<div class="nav-item active">🏠 Accueil</div>
<div class="nav-item">🎬 Shorts</div>
<div class="nav-item">📺 Abonnements</div>

<div class="divider"></div>

<div class="nav-item">🔥 Tendances</div>
<div class="nav-item">🎵 Musique</div>
<div class="nav-item">🎮 Gaming</div>
<div class="nav-item">📰 News</div>

</aside>

<main>

<div class="chips">
  <button class="chip active" onclick="filterCategory('Tous',this)">Tous</button>
  <button class="chip" onclick="filterCategory('Musique',this)">Musique</button>
  <button class="chip" onclick="filterCategory('Science',this)">Science</button>
  <button class="chip" onclick="filterCategory('Nature',this)">Nature</button>
  <button class="chip" onclick="filterCategory('Programmation',this)">Programmation</button>
</div>

<div class="video-grid" id="videoGrid"></div>

</main>

</div>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

<div class="modal">

<div class="player">

<button class="close-btn" onclick="closeVideo()">✕</button>

<iframe
id="videoFrame"
allowfullscreen
allow="autoplay">
</iframe>

</div>

<div class="modal-info">

<div class="modal-title" id="modalTitle"></div>

<div class="modal-meta" id="modalMeta"></div>

</div>

</div>

</div>

<script>

const videos = [

{
title:"Big Buck Bunny",
channel:"Blender Foundation",
views:"18 M vues",
time:"il y a 12 ans",
duration:"9:56",
cat:"Nature",
ytId:"aqz-KE-bpKQ",
thumb:"https://img.youtube.com/vi/aqz-KE-bpKQ/mqdefault.jpg"
},

{
title:"LoFi Hip Hop Radio",
channel:"ChillHop",
views:"120 M vues",
time:"il y a 2 ans",
duration:"LIVE",
cat:"Musique",
ytId:"jfKfPfyJRdk",
thumb:"https://img.youtube.com/vi/jfKfPfyJRdk/mqdefault.jpg"
},

{
title:"Earth from Space",
channel:"NASA",
views:"9 M vues",
time:"il y a 4 ans",
duration:"26:03",
cat:"Science",
ytId:"RtU_mdL2vBM",
thumb:"https://img.youtube.com/vi/RtU_mdL2vBM/mqdefault.jpg"
},

{
title:"How Internet Works",
channel:"Aaron",
views:"6 M vues",
time:"il y a 8 ans",
duration:"4:48",
cat:"Programmation",
ytId:"7_LPdttKXPc",
thumb:"https://img.youtube.com/vi/7_LPdttKXPc/mqdefault.jpg"
}

];

function renderVideos(list){

const grid = document.getElementById("videoGrid");

grid.innerHTML = "";

if(list.length === 0){

grid.innerHTML = `
<h2>Aucune vidéo trouvée 😢</h2>
`;

return;

}

list.forEach(video => {

const card = document.createElement("div");

card.className = "video-card";

card.innerHTML = `

<div class="thumb">

<img src="${video.thumb}" alt="${video.title}">

<div class="play">
<div class="play-btn">▶</div>
</div>

<div class="duration">
${video.duration}
</div>

</div>

<div class="video-info">

<div class="channel-icon">
${video.channel[0]}
</div>

<div class="video-meta">

<div class="video-title">
${video.title}
</div>

<div class="video-channel">
${video.channel}
</div>

<div class="video-stats">
${video.views} • ${video.time}
</div>

</div>

</div>
`;

card.addEventListener("click",()=>{

openVideo(video);

});

grid.appendChild(card);

});

}

function openVideo(video){

document.getElementById("videoFrame").src =
`https://www.youtube.com/embed/${video.ytId}?autoplay=1`;

document.getElementById("modalTitle").textContent =
video.title;

document.getElementById("modalMeta").textContent =
`${video.channel} • ${video.views}`;

document.getElementById("modalOverlay")
.classList.add("open");

document.body.style.overflow = "hidden";

}

function closeVideo(){

document.getElementById("modalOverlay")
.classList.remove("open");

document.getElementById("videoFrame").src = "";

document.body.style.overflow = "auto";

}

function closeModal(e){

if(e.target.id === "modalOverlay"){

closeVideo();

}

}

function doSearch(){

const value =
document.getElementById("searchInput")
.value
.toLowerCase();

const filtered = videos.filter(video =>

video.title.toLowerCase().includes(value) ||

video.channel.toLowerCase().includes(value) ||

video.cat.toLowerCase().includes(value)

);

renderVideos(filtered);

}

document
.getElementById("searchInput")
.addEventListener("keyup",e=>{

if(e.key === "Enter"){

doSearch();

}

});

function filterCategory(category,button){

document
.querySelectorAll(".chip")
.forEach(chip=>chip.classList.remove("active"));

button.classList.add("active");

if(category === "Tous"){

renderVideos(videos);

return;

}

const filtered =
videos.filter(v=>v.cat===category);

renderVideos(filtered);

}

document.addEventListener("keydown",e=>{

if(e.key === "Escape"){

closeVideo();

}

});

renderVideos(videos);

</script>

</body>
</html>
