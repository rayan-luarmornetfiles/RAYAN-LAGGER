<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLTAGE - Ultimate Stress Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d9ff;
            --secondary: #ff006e;
            --tertiary: #00ff88;
            --dark: #0a0e27;
            --darker: #050810;
            --card-bg: rgba(15, 30, 60, 0.6);
        }

        body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d0820 100%);
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a0e27 0%, #1a1a3e 25%, #2d0a4e 50%, #0d0820 75%, #0a0e27 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Rain */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            width: 1px;
            height: 30px;
            background: linear-gradient(180deg, rgba(0, 217, 255, 0.6), transparent);
            animation: fall 0.8s linear infinite;
            opacity: 0.4;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
        }

        .orb1 {
            width: 300px;
            height: 300px;
            background: rgba(0, 217, 255, 0.1);
            top: -100px;
            left: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .orb2 {
            width: 250px;
            height: 250px;
            background: rgba(255, 0, 110, 0.1);
            bottom: -50px;
            right: -50px;
            animation: float2 15s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            animation: slideInUp 0.8s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            box-shadow: 
                0 0 40px rgba(0, 217, 255, 0.1),
                inset 0 0 40px rgba(0, 217, 255, 0.05);
        }

        .card:hover {
            border-color: rgba(0, 217, 255, 0.5);
            transform: translateY(-10px);
            box-shadow: 
                0 20px 60px rgba(0, 217, 255, 0.2),
                inset 0 0 40px rgba(0, 217, 255, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-inner {
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-icon {
            font-size: 36px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(0, 217, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Warning */
        .warning {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.15) 0%, rgba(255, 0, 110, 0.05) 100%);
            border-left: 4px solid #ff006e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        /* Buttons */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 40px;
        }

        button {
            padding: 18px 28px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
        }

        button:active::before {
            width: 500px;
            height: 500px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: #0a0e27;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.3);
            font-weight: 900;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(0, 217, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid #ff006e;
            color: #ff006e;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 0, 110, 0.3);
            box-shadow: 0 8px 32px rgba(255, 0, 110, 0.2);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 35px;
        }

        .stat {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.08) 0%, rgba(0, 255, 136, 0.08) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat:hover {
            border-color: #00d9ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
        }

        .stat-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
            letter-spacing: 1.5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
        }

        /* Logs */
        .logs-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(0, 217, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px #00ff88; }
            50% { box-shadow: 0 0 30px #00ff88; }
        }

        .logs-container {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 14px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.8;
        }

        .log-entry {
            padding: 8px 12px;
            border-left: 3px solid transparent;
            margin-bottom: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .log-entry.success {
            color: #00ff88;
            border-left-color: #00ff88;
        }

        .log-entry.error {
            color: #ff4444;
            border-left-color: #ff4444;
        }

        .log-entry.info {
            color: #00d9ff;
            border-left-color: #00d9ff;
        }

        .log-entry.warning {
            color: #ffaa00;
            border-left-color: #ffaa00;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d9ff, #00ff88);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00a8cc, #00cc6e);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .card {
                padding: 40px 30px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 15px;
            }

            .card {
                padding: 30px 20px;
            }

            .card-title {
                font-size: 22px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .input-row {
                grid-template-columns: 1fr;
            }

            .logs-container {
                height: 300px;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-gradient"></div>

    <!-- Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <!-- Rain -->
    <div class="rain" id="rainContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <div class="content">
            <!-- Control Card -->
            <div class="card">
                <div class="card-inner">
                    <div class="card-title">
                        <span class="card-icon">⚡</span>
                        VOLTAGE
                    </div>

                    <div class="warning">
                        ⚠️ Tests locaux uniquement. Respectez les lois applicables.
                    </div>

                    <div class="form-group">
                        <label>Cible</label>
                        <input type="text" id="targetInput" placeholder="localhost ou IP" value="localhost">
                    </div>

                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="portInput" value="3000" min="1" max="65535">
                    </div>

                    <div class="input-row">
                        <div class="form-group">
                            <label>Req/Sec</label>
                            <input type="number" id="rpsInput" value="3000" min="10" max="50000">
                        </div>
                        <div class="form-group">
                            <label>Parallèle</label>
                            <input type="number" id="parallelInput" value="30" min="1" max="100">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Type</label>
                        <select id="typeInput">
                            <option value="get">GET</option>
                            <option value="post">POST</option>
                            <option value="mixed">MIXTE</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button class="btn-primary" id="startBtn" onclick="startSpamming()">▶ LANCER</button>
                        <button class="btn-secondary" id="stopBtn" onclick="stopSpamming()" disabled>⏹ STOP</button>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">Total</div>
                            <div class="stat-value" id="sentCount">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">RPS</div>
                            <div class="stat-value" id="rpsCounter">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Erreurs</div>
                            <div class="stat-value" id="errorCount">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Durée</div>
                            <div class="stat-value" id="elapsedTime">0s</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Logs Card -->
            <div class="card">
                <div class="card-inner">
                    <div class="card-title">
                        <span class="card-icon">📊</span>
                        LOGS
                    </div>

                    <div class="logs-status">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Prêt à tester</span>
                    </div>

                    <div class="logs-container" id="logContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Rain
        function initRain() {
            const container = document.getElementById('rainContainer');
            for (let i = 0; i < 150; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (0.6 + Math.random() * 0.4) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(drop);
            }
        }

        initRain();

        // Spammer
        let isSpamming = false;
        let sentCount = 0;
        let lastSecondCount = 0;
        let errorCount = 0;
        let startTime = null;
        let spamInterval = null;
        let timerInterval = null;

        function addLog(msg, type = 'info') {
            const log = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString('fr-FR');
            entry.textContent = `[${time}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 200) log.removeChild(log.firstChild);
        }

        function sendReq() {
            const host = document.getElementById('targetInput').value.trim();
            const port = document.getElementById('portInput').value.trim();
            if (!host || !port) return;

            sentCount++;
            lastSecondCount++;

            try {
                const img = new Image();
                img.src = `http://${host}:${port}/?t=${Date.now()}&r=${Math.random()}`;
                img.onload = () => addLog('✓ Requête envoyée', 'success');
                img.onerror = () => errorCount++;
            } catch (e) {
                errorCount++;
            }
        }

        function startSpamming() {
            const host = document.getElementById('targetInput').value.trim();
            const port = document.getElementById('portInput').value.trim();
            const rps = parseInt(document.getElementById('rpsInput').value) || 3000;
            const parallel = parseInt(document.getElementById('parallelInput').value) || 30;

            if (!host || !port) {
                alert('❌ Cible et port requis!');
                return;
            }

            isSpamming = true;
            sentCount = 0;
            errorCount = 0;
            lastSecondCount = 0;
            startTime = Date.now();

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('statusDot').classList.add('active');
            document.getElementById('statusText').textContent = '🔴 STRESS EN COURS';

            addLog(`🚀 LANCEMENT VERS ${host}:${port}`, 'info');
            addLog(`⚡ ${rps} req/s × ${parallel} connexions`, 'info');

            const interval = 1000 / (rps / parallel);
            spamInterval = setInterval(() => {
                if (isSpamming) {
                    for (let i = 0; i < parallel; i++) {
                        sendReq();
                    }
                }
            }, interval);

            timerInterval = setInterval(() => {
                document.getElementById('rpsCounter').textContent = lastSecondCount;
                document.getElementById('sentCount').textContent = sentCount;
                document.getElementById('errorCount').textContent = errorCount;
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('elapsedTime').textContent = elapsed + 's';
                lastSecondCount = 0;
            }, 1000);
        }

        function stopSpamming() {
            isSpamming = false;
            clearInterval(spamInterval);
            clearInterval(timerInterval);

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusDot').classList.remove('active');
            document.getElementById('statusText').textContent = '✓ Test terminé';

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            addLog(`✓ FIN après ${elapsed}s - ${sentCount} requêtes envoyées`, 'warning');
        }
    </script>
</body>
</html>
