<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON EXCUSE AI PRO 💜</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#0b0015,#000);
font-family:Arial;
color:white;
overflow:hidden;
}

.card{
width:780px;
padding:30px;
border-radius:25px;
background:rgba(40,0,60,0.75);
box-shadow:0 0 30px #a200ff,0 0 80px #6a00ff;
backdrop-filter:blur(10px);
}

h1{
text-align:center;
color:#ff00ff;
text-shadow:0 0 20px #a200ff;
}

textarea{
width:100%;
height:120px;
border-radius:15px;
border:none;
padding:15px;
background:#120018;
color:white;
resize:none;
box-shadow:inset 0 0 10px #a200ff;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#6a00ff,#ff00ff);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff00ff;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
background:#1a0025;
min-height:140px;
box-shadow:inset 0 0 15px #7a00ff;
line-height:1.6;
}

.copy{
margin-top:10px;
background:#2b003f;
}
</style>
</head>

<body>

<div class="card">

<h1>💜 NEON AI EXCUSE PRO 💜</h1>

<textarea id="input" placeholder="Décris ta situation (ex: retard, prof, copine, travail...)"></textarea>

<button onclick="generate()">⚡ Générer excuse IA</button>

<button class="copy" onclick="copyText()">📋 Copier l'excuse</button>

<div class="result" id="result">Ton excuse IA apparaîtra ici...</div>

</div>

<script>

let lastText = "";

// 🎯 Détection du contexte
function detectContext(text){
text = text.toLowerCase();

if(text.includes("prof") || text.includes("cours") || text.includes("école")) return "school";
if(text.includes("boss") || text.includes("travail") || text.includes("job")) return "work";
if(text.includes("copine") || text.includes("couple") || text.includes("relation")) return "love";
if(text.includes("ami") || text.includes("pote")) return "friend";
if(text.includes("rendez") || text.includes("annuler")) return "appointment";
return "general";
}

// 🧠 IA générative
function generate(){

let input = document.getElementById("input").value;

if(!input.trim()){
document.getElementById("result").innerHTML="Écris une situation 😄";
return;
}

let ctx = detectContext(input);

// 🎭 blocs intelligents
const start = [
"Bonjour, je tiens à m’excuser car",
"Je suis sincèrement désolé, mais",
"Veuillez excuser mon absence car",
"Je regrette de vous informer que",
"Je m’excuse pour la situation, mais"
];

const cause = [
"un imprévu important est survenu",
"une situation urgente m’a retenu",
"un problème inattendu s’est produit",
"une complication personnelle est apparue",
"un événement indépendant de ma volonté est arrivé"
];

const detail = {
school:[
"et je n’étais malheureusement pas en état de venir en cours.",
"ce qui m’a empêché d’arriver à l’heure en classe.",
"et j’ai dû rester chez moi pour gérer la situation."
],
work:[
"et cela m’a empêché de travailler correctement.",
"ce qui a impacté mon organisation professionnelle.",
"et je n’ai pas pu terminer mes tâches à temps."
],
love:[
"et je n’ai pas su gérer la situation correctement.",
"et je reconnais mon erreur dans cette situation.",
"et je comprends que cela ait pu te blesser."
],
friend:[
"et je n’ai pas pu répondre ou être présent.",
"et je n’ai pas géré la situation comme il fallait.",
"et je suis désolé pour mon absence."
],
appointment:[
"et je n’ai malheureusement pas pu honorer le rendez-vous.",
"ce qui m’a empêché de me présenter à temps.",
"et j’ai dû tout annuler à la dernière minute."
],
general:[
"et cela m’a totalement empêché de continuer normalement.",
"et je n’ai pas pu agir comme prévu.",
"et cela a perturbé mon organisation."
]
};

const end = [
"Merci pour votre compréhension.",
"Je m’excuse sincèrement.",
"J’espère que cela ne posera pas problème.",
"Veuillez accepter mes excuses.",
"Je ferai en sorte que cela ne se reproduise pas."
];

// 🎲 génération IA
let sentence =
start[Math.floor(Math.random()*start.length)] + " " +
cause[Math.floor(Math.random()*cause.length)] + " " +
detail[ctx][Math.floor(Math.random()*detail[ctx].length)] + " " +
end[Math.floor(Math.random()*end.length)];

lastText = sentence;

document.getElementById("result").innerHTML = sentence;
}

// 📋 copier
function copyText(){
navigator.clipboard.writeText(lastText);
alert("Excuse copiée 💜");
}

</script>

</body>
</html>
