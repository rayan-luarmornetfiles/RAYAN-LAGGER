<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lua AI Pro 2.0 💜</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0015;
font-family:Arial;
color:white;
}

.card{
width:950px;
padding:20px;
border-radius:15px;
background:#1a0025;
box-shadow:0 0 30px #6a00ff;
}

h1{
text-align:center;
color:#d946ef;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
background:#120018;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

pre{
margin-top:10px;
padding:12px;
background:#0f001a;
border-radius:10px;
min-height:260px;
white-space:pre-wrap;
font-size:13px;
overflow:auto;
}
</style>
</head>

<body>

<div class="card">

<h1>Lua AI Pro 2.0 💜</h1>

<textarea id="input" placeholder="Ex: un jeu avec shop, speed, téléport et boss qui donne de l'argent"></textarea>

<button onclick="generate()">Générer Lua</button>

<pre id="output">Résultat ici...</pre>

</div>

<script>

function detect(text){
text = text.toLowerCase();

return {
speed: text.includes("speed") || text.includes("vitesse"),
jump: text.includes("jump") || text.includes("saut"),
money: text.includes("money") || text.includes("argent") || text.includes("shop"),
combat: text.includes("combat") || text.includes("damage") || text.includes("boss"),
teleport: text.includes("tp") || text.includes("teleport"),
ui: text.includes("ui") || text.includes("menu"),
npc: text.includes("npc") || text.includes("bot"),
quest: text.includes("quest") || text.includes("mission"),
vehicle: text.includes("voiture") || text.includes("car"),
pet: text.includes("pet") || text.includes("animal"),
admin: text.includes("admin")
};
}

function generate(){

let text = document.getElementById("input").value;

if(!text.trim()){
document.getElementById("output").innerText = "Écris une idée 😄";
return;
}

let d = detect(text);

let code =
"-- 💜 LUA AI PRO 2.0 GENERATED\n\n" +
"local Players = game:GetService('Players')\n" +
"local Workspace = game:GetService('Workspace')\n\n" +
"local player = Players.LocalPlayer\n" +
"local character = player.Character or player.CharacterAdded:Wait()\n" +
"local humanoid = character:FindFirstChildOfClass('Humanoid')\n\n";

// 🚀 SPEED
if(d.speed){
code += "-- 🚀 SPEED SYSTEM\nhumanoid.WalkSpeed = 75\n\n";
}

// 🦘 JUMP
if(d.jump){
code += "-- 🦘 JUMP SYSTEM\nhumanoid.JumpPower = 140\n\n";
}

// 💰 MONEY / SHOP
if(d.money){
code += "-- 💰 ECONOMY SYSTEM\nlocal stats = player:FindFirstChild('leaderstats')\nif stats then\nlocal money = stats:FindFirstChild('Money')\nif money then money.Value += 1000 end end\n\n";
}

// ⚔️ COMBAT / BOSS
if(d.combat){
code += "-- ⚔️ COMBAT / BOSS SYSTEM\nhumanoid.Health -= 25\nprint('Damage applied')\n\n";
}

// 🚪 TELEPORT
if(d.teleport){
code += "-- 🚪 TELEPORT SYSTEM\ncharacter:MoveTo(Vector3.new(0,10,0))\n\n";
}

// 🖥️ UI
if(d.ui){
code += "-- 🖥️ UI SYSTEM\nprint('UI loaded')\n\n";
}

// 🤖 NPC
if(d.npc){
code += "-- 🤖 NPC SYSTEM\nlocal npc = Instance.new('Model')\nnpc.Parent = Workspace\n\n";
}

// 🧭 QUEST
if(d.quest){
code += "-- 🧭 QUEST SYSTEM\nlocal quest = {progress = 0}\nprint('Quest started')\n\n";
}

// 🚗 VEHICLE
if(d.vehicle){
code += "-- 🚗 VEHICLE SYSTEM\nprint('Vehicle system active')\n\n";
}

// 🐶 PET
if(d.pet){
code += "-- 🐶 PET SYSTEM\nprint('Pet system active')\n\n";
}

// 👮 ADMIN
if(d.admin){
code += "-- 👮 ADMIN SYSTEM\nprint('Admin system loaded')\n\n";
}

// 🧠 FULL GAME FALLBACK
if(code.length < 200){
code += "-- 🧠 AI FALLBACK\nprint('Custom system detected')\nprint('" + text + "')\n";
}

document.getElementById("output").innerText = code;
}

</script>

</body>
</html>
