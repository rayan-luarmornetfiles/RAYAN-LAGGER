<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Excuses Realistic 💜</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#0b0015,#000);
font-family:Arial;
color:white;
}

.card{
width:800px;
padding:30px;
border-radius:25px;
background:rgba(40,0,60,0.75);
box-shadow:0 0 30px #a200ff,0 0 80px #6a00ff;
}

h1{
text-align:center;
color:#ff00ff;
}

textarea{
width:100%;
height:120px;
border-radius:12px;
border:none;
padding:12px;
background:#120018;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#7c3aed;
color:white;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#1a0025;
min-height:140px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h1>Excuses IA 💜</h1>

<textarea id="input" placeholder="Décris ta situation (retard, devoirs, prof, etc...)"></textarea>

<button onclick="generate()">Générer une excuse</button>

<div class="result" id="result">Ton excuse apparaîtra ici...</div>

</div>

<script>

function detect(text){
text = text.toLowerCase();

if(text.includes("école") || text.includes("cours") || text.includes("devoir")) return "school";
if(text.includes("travail") || text.includes("taf")) return "work";
if(text.includes("retard")) return "late";
return "general";
}

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let input = document.getElementById("input").value;
if(!input.trim()){
document.getElementById("result").innerText="Écris ta situation 😄";
return;
}

let ctx = detect(input);

const school = [
"J’ai eu plusieurs devoirs et révisions en même temps aujourd’hui, j’ai mal géré mon organisation et j’ai pris du retard.",
"J’ai sous-estimé la charge de travail, et j’ai eu du mal à terminer tout ce qui était prévu.",
"J’ai essayé de tout faire mais j’ai été débordé par les cours et je n’ai pas réussi à finir correctement."
];

const work = [
"J’ai eu une journée assez chargée avec plusieurs tâches urgentes, ce qui m’a empêché de tout terminer à temps.",
"J’ai été interrompu plusieurs fois aujourd’hui et j’ai perdu pas mal de temps sur mon organisation.",
"J’ai eu plus de travail que prévu aujourd’hui et je n’ai pas réussi à finir dans les délais."
];

const late = [
"J’ai eu un problème de transport ce matin, ce qui m’a retardé de manière imprévue.",
"Il y a eu un imprévu sur le trajet et je n’ai pas pu arriver à l’heure.",
"J’ai mal estimé le temps de trajet à cause de perturbations."
];

const general = [
"J’ai eu un imprévu personnel aujourd’hui qui a perturbé mon organisation.",
"Ma journée a été plus compliquée que prévu et j’ai pris du retard sur ce que je devais faire.",
"J’ai eu plusieurs choses à gérer en même temps et je n’ai pas réussi à tout suivre."
];

let result = "";

if(ctx === "school") result = pick(school);
else if(ctx === "work") result = pick(work);
else if(ctx === "late") result = pick(late);
else result = pick(general);

document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
