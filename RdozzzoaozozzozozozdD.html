<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Photo - John Pork</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
}

/* effet photo */
.photo {
  width: 420px;
  height: 520px;
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  background: radial-gradient(circle at 30% 20%, #2a2a2a, #0b0b0b);
}

/* lumière ambiante type flash */
.photo::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.12), transparent 60%);
  mix-blend-mode: screen;
}

/* grain photo */
.photo::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.15;
  mix-blend-mode: overlay;
}

/* personnage stylisé */
.character {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 380px;
  filter: contrast(1.1) saturate(0.9);
}

/* tête */
.head {
  width: 180px;
  height: 160px;
  background: #f2c9a0;
  border-radius: 50% 50% 45% 45%;
  margin: 0 auto;
  position: relative;
  box-shadow: inset -20px -30px 40px rgba(0,0,0,0.15);
}

/* oreilles */
.head::before,
.head::after {
  content: "";
  position: absolute;
  width: 40px;
  height: 60px;
  background: #e8b98f;
  border-radius: 50%;
  top: 30px;
}

.head::before { left: -30px; transform: rotate(-20deg); }
.head::after { right: -30px; transform: rotate(20deg); }

/* museau */
.snout {
  width: 90px;
  height: 70px;
  background: #e3a87a;
  border-radius: 50%;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: inset 0 -10px 15px rgba(0,0,0,0.2);
}

/* narines */
.snout::before,
.snout::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 18px;
  background: #7a4a3a;
  border-radius: 50%;
  top: 20px;
}

.snout::before { left: 25px; }
.snout::after { right: 25px; }

/* corps */
.body {
  width: 140px;
  height: 180px;
  background: #2a2a2a;
  margin: -10px auto 0;
  border-radius: 20px;
}

/* effet profondeur */
.blur-floor {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 80px;
  background: rgba(0,0,0,0.4);
  filter: blur(20px);
  border-radius: 50%;
}
</style>
</head>

<body>
  <div class="photo">
    <div class="character">
      <div class="head">
        <div class="snout"></div>
      </div>
      <div class="body"></div>
    </div>
    <div class="blur-floor"></div>
  </div>
</body>
</html>
