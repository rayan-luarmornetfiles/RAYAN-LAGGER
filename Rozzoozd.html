<!DOCTYPE html>
<html>
<head>
    <title>Mon IA GPT-2</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
        }

        #chat {
            border: 1px solid #ccc;
            height: 400px;
            padding: 10px;
            overflow-y: auto;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>🤖 Mon IA GPT-2</h2>

<div id="chat"></div>

<input id="message" placeholder="Écris un message...">
<button onclick="envoyer()">Envoyer</button>

<script>

const API_KEY = "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";

async function envoyer() {

    let message = document.getElementById("message").value;

    document.getElementById("chat").innerHTML += 
    "<p><b>Toi :</b> " + message + "</p>";

    const response = await fetch(
        "https://api-inference.huggingface.co/models/openai-community/gpt2",
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                inputs: message,
                parameters: {
                    max_new_tokens: 100,
                    temperature: 0.8
                }
            })
        }
    );

    const data = await response.json();

    document.getElementById("chat").innerHTML +=
    "<p><b>GPT-2 :</b> " + data[0].generated_text + "</p>";

}

</script>

</body>
</html>
