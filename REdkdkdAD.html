<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excuses IA</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0015;
font-family:Arial;
color:white;
}

.card{
width:750px;
padding:25px;
border-radius:15px;
background:#1a0025;
box-shadow:0 0 25px #6a00ff;
}

h1{
text-align:center;
color:#d946ef;
}

textarea{
width:100%;
height:110px;
padding:10px;
border-radius:10px;
border:none;
background:#120018;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

.result{
margin-top:15px;
padding:12px;
border-radius:10px;
background:#0f001a;
min-height:120px;
line-height:1.5;
}
</style>
</head>

<body>

<div class="card">

<h1>Excuses IA 💜</h1>

<textarea id="input" placeholder="Décris la situation..."></textarea>

<button onclick="generate()">Générer</button>

<div class="result" id="result">Ton excuse apparaîtra ici...</div>

</div>

<script>

function detect(text){
text = text.toLowerCase();

if(text.includes("école") || text.includes("cours") || text.includes("devoir")) return "school";
if(text.includes("travail") || text.includes("taf")) return "work";
if(text.includes("retard")) return "late";
return "general";
}

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let input = document.getElementById("input").value;
if(!input.trim()){
document.getElementById("result").innerText="Écris ta situation";
return;
}

let t = detect(input);

// 💜 STYLE PLUS NATUREL (cause → conséquence)
const school = [
"Il y a eu pas mal de devoirs et de cours aujourd’hui, du coup j’ai eu du retard dans mon organisation et je n’ai pas pu tout finir.",
"Il y a eu plusieurs choses à faire en même temps aujourd’hui, donc j’ai été un peu dépassé et je n’ai pas réussi à tout terminer.",
"Il y a eu une grosse charge de travail aujourd’hui, du coup j’ai mal géré mon temps et je n’ai pas pu finir."
];

const work = [
"Il y a eu plusieurs tâches urgentes aujourd’hui, donc j’ai eu du retard dans mon organisation et je n’ai pas pu tout finir.",
"Il y a eu pas mal d’imprévus dans la journée, du coup j’ai été un peu débordé et je n’ai pas terminé tout ce qui était prévu.",
"Il y a eu beaucoup de choses à gérer en même temps, donc j’ai pris du retard sur le travail."
];

const late = [
"Il y a eu un problème de transport aujourd’hui, donc j’ai eu du retard et je n’ai pas pu arriver à l’heure.",
"Il y a eu un imprévu sur le trajet, du coup j’ai été retardé et je n’ai pas pu arriver comme prévu.",
"Il y a eu des perturbations aujourd’hui, donc j’ai pris du retard."
];

const general = [
"Il y a eu un imprévu aujourd’hui, du coup j’ai eu du retard dans mon organisation et je n’ai pas pu tout faire.",
"Il y a eu plusieurs choses à gérer aujourd’hui, donc j’ai été un peu dépassé et je n’ai pas réussi à tout finir.",
"Il y a eu une journée un peu compliquée, du coup j’ai pris du retard."
];

let result = "";

if(t === "school") result = pick(school);
else if(t === "work") result = pick(work);
else if(t === "late") result = pick(late);
else result = pick(general);

document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
