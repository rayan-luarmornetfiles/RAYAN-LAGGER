<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>World Mini Maps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

  <style>
    html, body { margin: 0; height: 100%; }

    #map { height: 100%; width: 100%; }

    #ui {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: white;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      padding: 7px;
      width: 180px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 7px 10px;
      border: none;
      border-radius: 8px;
      background: #2b7cff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1a5fd0;
    }
  </style>
</head>

<body>

<div id="ui">
  <input id="start" placeholder="Départ (ville / pays)" />
  <input id="end" placeholder="Arrivée (ville / pays)" />
  <button onclick="makeRoute()">🚗 Itinéraire</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
  // 🌍 Carte monde entier
  const map = L.map('map', {
    worldCopyJump: true,
    maxZoom: 18
  }).setView([20, 0], 2); // vue globale monde

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    noWrap: false
  }).addTo(map);

  let routeControl;

  // 🔎 géocodage monde entier
  async function geocode(place) {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.length) throw new Error("Lieu introuvable 🌍");

    return {
      lat: parseFloat(data[0].lat),
      lon: parseFloat(data[0].lon),
      name: data[0].display_name
    };
  }

  // 🚗 itinéraire monde entier
  async function makeRoute() {
    try {
      const startTxt = document.getElementById("start").value;
      const endTxt = document.getElementById("end").value;

      if (!startTxt || !endTxt) {
        alert("Entre un départ et une arrivée 😄");
        return;
      }

      const start = await geocode(startTxt);
      const end = await geocode(endTxt);

      if (routeControl) {
        map.removeControl(routeControl);
      }

      routeControl = L.Routing.control({
        waypoints: [
          L.latLng(start.lat, start.lon),
          L.latLng(end.lat, end.lon)
        ],
        lineOptions: {
          styles: [{ color: "#2b7cff", weight: 5 }]
        },
        routeWhileDragging: true,
        show: false
      }).addTo(map);

      map.setView([start.lat, start.lon], 4);

      L.marker([start.lat, start.lon]).addTo(map)
        .bindPopup("🚩 Départ<br>" + start.name).openPopup();

      L.marker([end.lat, end.lon]).addTo(map)
        .bindPopup("🏁 Arrivée<br>" + end.name);

    } catch (e) {
      alert("Erreur 🌍 : " + e.message);
    }
  }

  // 📍 clic libre monde entier
  map.on("click", e => {
    L.marker([e.latlng.lat, e.latlng.lng])
      .addTo(map)
      .bindPopup("📍 Position mondiale")
      .openPopup();
  });
</script>

</body>
</html>
