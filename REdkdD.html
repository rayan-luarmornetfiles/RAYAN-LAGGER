<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lua AI GPT 💜</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0015;
font-family:Arial;
color:white;
}

.card{
width:900px;
padding:20px;
background:#1a0025;
border-radius:15px;
box-shadow:0 0 30px #6a00ff;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
background:#120018;
color:white;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

pre{
margin-top:10px;
background:#0f001a;
padding:10px;
border-radius:10px;
min-height:200px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="card">

<h1>Lua AI GPT 💜</h1>

<textarea id="input" placeholder="Ex: crée un shop avec argent et téléport"></textarea>

<button onclick="generate()">Générer Lua</button>

<pre id="output">Résultat ici...</pre>

</div>

<script>

async function generate(){

let text = document.getElementById("input").value;

if(!text.trim()){
document.getElementById("output").innerText = "Écris une idée 😄";
return;
}

// ⚠️ MET TA CLÉ ICI PLUS TARD
const API_KEY = "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";

let res = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + API_KEY
},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{
role: "system",
content: "Tu es une IA qui génère du code Lua Roblox propre et fonctionnel."
},
{
role: "user",
content: text
}
]
})
});

let data = await res.json();

document.getElementById("output").innerText =
data.choices?.[0]?.message?.content || "Erreur API";
}

</script>

</body>
</html>
