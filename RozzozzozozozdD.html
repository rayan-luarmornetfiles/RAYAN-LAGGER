<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Live Maps GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

  <style>
    html, body { margin: 0; height: 100%; }

    #map { height: 100%; width: 100%; }

    #ui {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: white;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      flex-wrap: wrap;
    }

    input {
      padding: 7px;
      width: 180px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 7px 10px;
      border: none;
      border-radius: 8px;
      background: #2b7cff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1a5fd0;
    }
  </style>
</head>

<body>

<div id="ui">
  <button onclick="startGPS()">📍 Activer GPS</button>
  <input id="end" placeholder="Destination" />
  <button onclick="startRoute()">🚗 Démarrer navigation</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let userMarker;
  let userPos = null;
  let routeControl;
  let watchId = null;

  // 📡 GPS live
  function startGPS() {
    if (!navigator.geolocation) {
      alert("GPS non supporté 😢");
      return;
    }

    watchId = navigator.geolocation.watchPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      userPos = [lat, lon];

      if (!userMarker) {
        userMarker = L.marker(userPos)
          .addTo(map)
          .bindPopup("📍 Vous êtes ici");
      } else {
        userMarker.setLatLng(userPos);
      }

      map.setView(userPos, 16);

      // 🔄 met à jour la route en live si elle existe
      if (routeControl) {
        const w = routeControl.getWaypoints();
        if (w.length === 2) {
          routeControl.setWaypoints([
            L.latLng(lat, lon),
            w[1].latLng
          ]);
        }
      }

    }, err => {
      alert("Erreur GPS 😢");
    }, {
      enableHighAccuracy: true
    });
  }

  // 🔎 géocodage monde entier
  async function geocode(place) {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`
    );
    const data = await res.json();

    if (!data.length) throw new Error("Lieu introuvable 🌍");

    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
  }

  // 🚗 démarrer navigation live
  async function startRoute() {
    try {
      if (!userPos) {
        alert("Active d'abord le GPS 📍");
        return;
      }

      const endTxt = document.getElementById("end").value;
      if (!endTxt) return alert("Entre une destination 😄");

      const end = await geocode(endTxt);

      if (routeControl) map.removeControl(routeControl);

      routeControl = L.Routing.control({
        waypoints: [
          L.latLng(userPos[0], userPos[1]),
          L.latLng(end[0], end[1])
        ],
        lineOptions: {
          styles: [{ color: "#2b7cff", weight: 5 }]
        },
        routeWhileDragging: true,
        show: false
      }).addTo(map);

      map.setView(userPos, 16);

      L.marker(end)
        .addTo(map)
        .bindPopup("🏁 Destination")
        .openPopup();

    } catch (e) {
      alert("Erreur : " + e.message);
    }
  }
</script>

</body>
</html>
